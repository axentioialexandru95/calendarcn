        - list [ref=e1030]:
          - listitem [ref=e1031]:
            - text: Week and day views expose a roving schedule grid. Tab enters the active day once, arrow keys move the active slot, and
            - code [ref=e1032]: Enter
            - text: or
            - code [ref=e1033]: Space
            - text: starts the create flow for that slot.
          - listitem [ref=e1034]:
            - text: Event cards stay as buttons. Arrow keys move a selected event,
            - code [ref=e1035]: Shift + Arrow
            - text: resizes the end,
            - code [ref=e1036]: Alt + Arrow
            - text: resizes the start, and
            - code [ref=e1037]: Shift + F10
            - text: opens the event context menu.
          - listitem [ref=e1038]: Month uses grid semantics and agenda uses list semantics so assistive technology gets the same structural cues as the visual layout.
          - listitem [ref=e1039]: The optional sheets, confirmation dialog, and shortcuts dialog add-ons all use modal focus management with escape handling, overlay dismiss, and focus restore.
        - heading "Notes" [level=2] [ref=e1040]:
          - link "Notes" [ref=e1041] [cursor=pointer]:
            - /url: "#notes"
          - img [ref=e1042]
        - list [ref=e1045]:
          - listitem [ref=e1046]:
            - code [ref=e1047]: CalendarRoot
            - text: is fully controlled. Keep
            - code [ref=e1048]: date
            - text: ","
            - code [ref=e1049]: view
            - text: ", and"
            - code [ref=e1050]: events
            - text: in your own state or wire them into your store.
          - listitem [ref=e1051]:
            - code [ref=e1052]: CalendarToolbar
            - text: is separate on purpose. Primitive installs keep navigation, view switching, and quick actions outside the surface component.
          - listitem [ref=e1053]:
            - text: The utility helpers in
            - code [ref=e1054]: "@/components/calendar/utils"
