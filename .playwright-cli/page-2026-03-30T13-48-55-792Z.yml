        - list [ref=e997]:
          - listitem [ref=e998]:
            - text: Week and day views expose a roving schedule grid. Tab enters the active day once, arrow keys move the active slot, and
            - code [ref=e999]: Enter
            - text: or
            - code [ref=e1000]: Space
            - text: starts the create flow for that slot.
          - listitem [ref=e1001]:
            - text: Event cards stay as buttons. Arrow keys move a selected event,
            - code [ref=e1002]: Shift + Arrow
            - text: resizes the end,
            - code [ref=e1003]: Alt + Arrow
            - text: resizes the start, and
            - code [ref=e1004]: Shift + F10
            - text: opens the event context menu.
          - listitem [ref=e1005]: Month uses grid semantics and agenda uses list semantics so assistive technology gets the same structural cues as the visual layout.
          - listitem [ref=e1006]: The optional sheets, confirmation dialog, and shortcuts dialog add-ons all use modal focus management with escape handling, overlay dismiss, and focus restore.
        - heading "Notes" [level=2] [ref=e1007]:
