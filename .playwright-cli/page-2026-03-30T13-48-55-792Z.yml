            - /url: "#notes"
          - img [ref=e1009]
        - list [ref=e1012]:
          - listitem [ref=e1013]:
            - code [ref=e1014]: CalendarRoot
            - text: is fully controlled. Keep
            - code [ref=e1015]: date
            - text: ","
            - code [ref=e1016]: view
            - text: ", and"
            - code [ref=e1017]: events
            - text: in your own state or wire them into your store.
          - listitem [ref=e1018]:
            - code [ref=e1019]: CalendarToolbar
            - text: is separate on purpose. Primitive installs keep navigation, view switching, and quick actions outside the surface component.
          - listitem [ref=e1020]:
            - text: The utility helpers in
            - code [ref=e1021]: "@/components/calendar/utils"
            - text: are the fastest path to local optimistic handlers for move, resize, and create flows.
